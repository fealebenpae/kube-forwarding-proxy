services:
  test-runner:
    build:
      context: ../..
      dockerfile: e2e.Dockerfile
    privileged: true
    network_mode: service:docker
    environment:
      DOCKER_HOST: tcp://localhost:2375
    depends_on:
      docker:
        condition: service_healthy
  docker:
    image: docker:dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    expose:
      - "2375"
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
