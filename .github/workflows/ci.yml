name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
       # GOWORK=off ensures only the root module is tested, not tests/e2e
      GOWORK: off
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: |
          go mod download
          go test -race -count=1 ./...

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run e2e tests
        run: ./tests/e2e/run.sh

  e2e-macos:
    name: E2E Tests (macOS)
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          set-host: true
      - name: Run e2e tests
        run: sudo -E go test -v -count=1 -timeout 30m ./tests/e2e/

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=k8s-proxy.tar
      - name: Compress image archive
        run: gzip k8s-proxy.tar
      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: k8s-proxy.tar.gz
          retention-days: ${{ github.event_name == 'pull_request' && 1 || 7 }}

  docker-push:
    name: Push to ghcr.io
    runs-on: ubuntu-latest
    needs: [lint, unit-test, e2e, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
      - name: Decompress image archive
        run: gunzip k8s-proxy.tar.gz
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          TAG=${{ github.ref_name }}
          TAG=${TAG#v}
          mkdir -p /tmp/oci
          tar xf k8s-proxy.tar -C /tmp/oci
          skopeo copy --multi-arch all oci:/tmp/oci "docker://$IMAGE:$TAG"
          skopeo copy --multi-arch all oci:/tmp/oci "docker://$IMAGE:latest"

  pkg-build:
    name: Build macOS pkg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build pkg
        run: bash packaging/macos/build.sh
      - uses: actions/upload-artifact@v7
        with:
          name: macos-pkg
          path: k8s-proxy-*.pkg
          retention-days: ${{ github.event_name == 'pull_request' && 1 || 7 }}

  pkg-smoke-test:
    name: macOS pkg Smoke Test
    runs-on: macos-latest
    needs: [pkg-build]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: macos-pkg
      - name: Install pkg
        run: sudo installer -pkg k8s-proxy-*.pkg -target /
      - name: Wait for service to be ready
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://127.0.0.1:11616/readyz; then
              echo ""
              exit 0
            fi
            sleep 1
          done
          echo "Service did not become ready in time" >&2
          exit 1
      - name: Verify service is loaded
        run: sudo launchctl print system/io.github.fealebenpae.k8s-proxy
      - name: Verify resolver is registered
        run: scutil --dns | grep svc.cluster.local
      - name: Verify DNS server responds
        run: dig @127.0.0.1 -p 11617 foo.default.svc.cluster.local

  pkg-publish:
    name: Publish macOS pkg to GitHub Release
    runs-on: ubuntu-latest
    needs: [lint, unit-test, e2e-macos, pkg-smoke-test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: macos-pkg
      - name: Create release if it does not exist
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft=false \
            || true
      - name: Upload pkg to release
        run: gh release upload "${{ github.ref_name }}" k8s-proxy-*.pkg --clobber
