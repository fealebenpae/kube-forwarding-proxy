name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
       # GOWORK=off ensures only the root module is tested, not tests/e2e
      GOWORK: off
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: |
          go mod download
          go test -race -count=1 ./...

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run e2e tests
        run: ./tests/e2e/run.sh

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=k8s-proxy.tar
      - name: Compress image archive
        run: gzip k8s-proxy.tar
      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: k8s-proxy.tar.gz
          retention-days: ${{ github.event_name == 'pull_request' && 1 || 7 }}

  docker-push:
    name: Push to ghcr.io
    runs-on: ubuntu-latest
    needs: [lint, unit-test, e2e, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
      - name: Decompress image archive
        run: gunzip k8s-proxy.tar.gz
      - uses: imjasonh/setup-crane@v0.5
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          TAG=${{ github.ref_name }}
          crane push k8s-proxy.tar "$IMAGE:$TAG"
          crane tag "$IMAGE:$TAG" latest
